  2. Evergreen 的「常青」機制

  Evergreen Notes 的核心是筆記會隨時間演進。對於 AI 萃取的筆記：
  - B. 增量更新 — 新書有相關概念時，AI 建議合併或連結

  3. 跨書籍概念連結（Zettelkasten 核心）

  當不同書籍談到相似概念時（例如《原子習慣》和《刻意練習》都談「重複」）：
  - B. AI 建議連結 — 列出可能相關的卡片，你確認

  4. 書籍類型判斷

  針對不同領域使用不同 Prompt：
  - C. 混合 — AI 先猜，你可覆寫 

   Implementation complete. Here's a summary of what was created:                                                                                   
                                                                                                                                                     Files Created/Modified                                                                                                                                                                                                                                                                              
  1. zettelkasten_generator.py (New)                                                                                                                 
  Contains all the core Zettelkasten functionality:
  - ZettelkastenCard dataclass - stores card data (title, content, source highlight, chapter, etc.)
  - CardSelectionAlgorithm - selects best highlights based on:
    - Pre-filtering (30-500 chars)
    - Scoring (length, position, keywords, completeness)
    - Chapter distribution (max 3 per chapter)
  - ZettelkastenLLMEnhancer - Ollama integration for generating card drafts
  - GeminiReviewer - Gemini API for quality review and refinement
  - ZettelkastenCardGenerator - main orchestrator class

  2. uploadToNotion.py (Modified)

  Added:
  - Import of Zettelkasten module with graceful fallback
  - Configuration variables for three-database architecture
  - sync_zettelkasten_cards() - creates card pages in Notion with relations
  - get_book_page_from_books_database() - queries books database for relation
  - generate_and_sync_zettelkasten_cards() - main entry point for card generation
  - Integration in process_single_book() at the end of new book processing

  3. .env.example (Updated)

  Added configuration for:
  - Three Notion database IDs (Books, Highlights, Zettelkasten)
  - Zettelkasten feature toggle and settings
  - Ollama LLM settings
  - Gemini API settings

  To Enable the Feature

  1. Create Zettelkasten database in Notion with schema:
    - Title (title), Content (rich_text), Source Book (relation), Source Highlights Page (relation), Source Highlight Text (rich_text), Source     
  Chapter (rich_text), Created Date (date), Tags (multi_select)
  2. Configure .env:
  ENABLE_ZETTELKASTEN_CARDS=true
  NOTION_ZETTELKASTEN_DATABASE_ID=your_database_id
  GEMINI_API_KEY=your_api_key
  3. Start Ollama: ollama serve and ollama pull gemma:2b